name: Release

on:
  push:
    branches: [main]

# Queue, never cancel: a run that merges a release PR must finish publishing
# its version tags even if another push lands mid-build.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check
      - run: pnpm lint:check
      - run: pnpm typecheck
      - run: pnpm test
  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Bumps from the conventional commit subjects since the last tag:
      # fix → patch, feat → minor, BREAKING CHANGE/! → major. With
      # default_bump: false, chore/docs/ci merges create no tag and the
      # publish job ships only a sha image without moving `latest`.
      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
      - if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
  publish:
    needs: [verify, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Every main push gets an immutable sha tag; version tags and
          # `latest` move only when the release job cut a tag. Tags created
          # via GITHUB_TOKEN don't trigger workflows, so the versioned
          # publish must chain off the release job's outputs here instead
          # of an `on: push: tags` trigger.
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ startsWith(needs.release.outputs.new_tag, 'v') }}
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }},enable=${{ startsWith(needs.release.outputs.new_tag, 'v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }},enable=${{ startsWith(needs.release.outputs.new_tag, 'v') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
